name: forex-pipeline

on:
  schedule:
    - cron: '0 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser vaderSentiment requests streamlit pandas \
                      transformers torch numpy --quiet 2>&1 | tail -5

      - name: Run FinBERT pipeline
        run: python src/export.py --engine finbert

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          publish_branch: gh-pages
          force_orphan: true
